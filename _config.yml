title: pyck shell benchmarks
author: pyck-iga
only_build_toc_files: true

execute:
  execute_notebooks: "off"

repository:
  url: https://github.com/pyck-iga/pyck-examples
  path_to_book: .
  branch: main

html:
  use_repository_button: true
  use_issues_button: true

parse:
  myst_enable_extensions:
    - dollarmath
    - colon_fence
    - html_image

sphinx:
  config:
    nb_custom_formats:
      .py:
        - jupytext.reads
        - fmt: py:percent
