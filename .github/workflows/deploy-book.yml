name: deploy-book

# Build the Jupyter Book in demo/ and publish it to GitHub Pages on every push to
# main. Pages source must be set to "GitHub Actions" in the repository settings
# (Settings -> Pages -> Build and deployment -> Source: GitHub Actions).

on:
  push:
    branches: [main]
    paths:
      - demo/**
      - .github/workflows/deploy-book.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: pip install -r demo/requirements.txt
      - name: Build the book
        run: jupyter-book build demo/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
